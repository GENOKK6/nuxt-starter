<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - FlowBill</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
        }
        .login-logo {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .form-control:focus {
            border-color: var(--primary);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card glass login-card">
        <div class="login-logo">
            <i class="ri-blaze-fill"></i>
        </div>
        <h2 style="margin-bottom: 30px;">Connexion à FlowBill</h2>
        
        <!-- Ce formulaire ne fait rien côté serveur, il redirige juste vers le dashboard -->
        <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div class="form-group">
                <label for="email">Adresse Email Pro</label>
                <input type="email" id="email" class="form-control" placeholder="vous@entreprise.com" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top: 10px;">
                Se connecter
            </button>
        </form>

        <a href="index.html" class="back-link"><i class="ri-arrow-left-line"></i> Retour à l'accueil</a>
    </div>
</body>
</html>
